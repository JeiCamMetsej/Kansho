name: Release

on:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        continue-on-error: true
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}

  # ── Build APK on every push (always runs) ──
  build-apk:
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Node.js setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Generate Prisma client ──
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:dummy@localhost:5432/ci

      # ── Java & Gradle ──
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Configure server URL ──
      - name: Set server URL in Capacitor config
        run: |
          SERVER_URL="${{ secrets.SERVER_URL || 'https://kansho.vercel.app' }}"
          echo "Using server URL: $SERVER_URL"
          jq --arg url "$SERVER_URL" '.server.url = $url' capacitor.config.json > capacitor.tmp.json
          mv capacitor.tmp.json capacitor.config.json
          cat capacitor.config.json

      # ── Decode or generate release keystore ──
      - name: Decode or generate release keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/kansho-release-key.jks
            echo "Keystore decoded successfully"
          else
            echo "No KEYSTORE_BASE64 secret set — generating temporary keystore for testing"
            keytool -genkey -v -keystore android/app/kansho-release-key.jks \
              -alias kansho -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass KanshoRelease2024 -keypass KanshoRelease2024 \
              -dname "CN=Kansho, OU=Kansho, O=Kansho, L=Unknown, ST=Unknown, C=US"
          fi

      # ── Accept Android SDK licenses ──
      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses
          else
            echo "sdkmanager not found at $SDKMANAGER"
            ls -la "$ANDROID_HOME/"
          fi

      # ── Build Next.js ──
      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://ci:dummy@localhost:5432/ci

      # ── Prepare web directory for Capacitor ──
      - name: Prepare web directory
        run: |
          mkdir -p out
          echo '<html><body><p>Kanshō — Loading...</p></body></html>' > out/index.html

      # ── Sync Capacitor ──
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── Make gradlew executable ──
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Build release APK (signed with temporary keystore if needed) ──
      - name: Build release APK
        run: cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/kansho-release-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || 'KanshoRelease2024' }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || 'kansho' }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || 'KanshoRelease2024' }}

      # ── Upload APK as artifact (always) ──
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kansho-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      # ── Upload APK to GitHub Release (only if release-please created one) ──
      - name: Upload APK to release
        if: ${{ needs.release-please.outputs.release_created }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: android/app/build/outputs/apk/release/app-release.apk
