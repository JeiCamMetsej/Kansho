name: Build Android APK

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Backend server URL that the APK will connect to'
        required: false
        default: ''
      build_type:
        description: 'Build type: debug or release'
        required: false
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Node.js setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Generate Prisma client ──
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:dummy@localhost:5432/ci

      # ── Java & Gradle ──
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Configure server URL ──
      - name: Set server URL in Capacitor config
        run: |
          SERVER_URL="${{ github.event.inputs.server_url || secrets.SERVER_URL || 'https://kansho-j5yb4xly3-jeicammetsejs-projects.vercel.app' }}"
          echo "Using server URL: $SERVER_URL"
          jq --arg url "$SERVER_URL" '.server.url = $url' capacitor.config.json > capacitor.tmp.json
          mv capacitor.tmp.json capacitor.config.json
          cat capacitor.config.json

      # ── Decode release keystore (if KEYSTORE_BASE64 secret is set) ──
      - name: Decode release keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/kansho-release-key.jks
            echo "Keystore decoded successfully"
          else
            echo "No KEYSTORE_BASE64 secret set — skipping keystore decode"
          fi

      # ── Accept Android SDK licenses ──
      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses
          else
            echo "sdkmanager not found at $SDKMANAGER"
            ls -la "$ANDROID_HOME/"
          fi

      # ── Build Next.js ──
      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://ci:dummy@localhost:5432/ci

      # ── Prepare web directory for Capacitor ──
      - name: Prepare web directory
        run: |
          mkdir -p out
          echo '<html><body><p>Kanshō — Loading...</p></body></html>' > out/index.html

      # ── Sync Capacitor ──
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── Determine build type ──
      - name: Determine build type
        id: build_type
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            # On tags: release, otherwise: debug
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              BUILD_TYPE="release"
            else
              BUILD_TYPE="debug"
            fi
          fi
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "Building: $BUILD_TYPE"

      # ── Make gradlew executable ──
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Build APK ──
      - name: Build APK
        run: |
          cd android
          BUILD_TYPE="${{ steps.build_type.outputs.BUILD_TYPE }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/kansho-release-key.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || 'KanshoRelease2024' }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || 'kansho' }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || 'KanshoRelease2024' }}

      # ── Upload APK as artifact ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kansho-${{ steps.build_type.outputs.BUILD_TYPE }}
          path: android/app/build/outputs/apk/${{ steps.build_type.outputs.BUILD_TYPE }}/app-${{ steps.build_type.outputs.BUILD_TYPE }}.apk
          retention-days: 30
          if-no-files-found: error
